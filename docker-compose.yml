version: '3.8'

services:
  bot:
    build: .
    container_name: ofd_discord_bot
    init: true
    restart: unless-stopped
    working_dir: /app/discord-bot-form
    command: npm start
    # Variabel environment di-load dari file .env bot
    env_file:
      - ./discord-bot-form/.env
    # Volume untuk menyimpan data persisten & session agar tidak hilang saat restart
    volumes:
      - ./data:/app/data
      - ./src/database:/app/src/database
      - ./src/logs:/app/src/logs
      - ./src/laporan:/app/src/laporan
      - ./src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
      - ./src/baseline/shopee/data:/app/src/baseline/shopee/data
      - ./src/VB/shopee/sessions:/app/src/VB/shopee/sessions
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=superfood_admin
      - DB_PASS=superfood_password
      - DB_NAME=srs_db
      - HEADLESS=true
      - TZ=Asia/Jakarta

  # ── Service Terpisah: Discord Bot Session Monitor ─────────────────────
  session-monitor:
    build:
      context: ./discord-bot-session-monitor
      dockerfile: Dockerfile
    container_name: ofd_session_monitor
    init: true
    restart: unless-stopped
    # Variabel environment dari file .env milik bot session monitor
    env_file:
      - ./discord-bot-session-monitor/.env
    # Volume shared: akses ke Python venv & data session Shopee
    volumes:
      - ./src/.venv:/app/src/.venv:ro
      - ./src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
      - ./check_shopee_browsers.py:/app/check_shopee_browsers.py:ro
    environment:
      - TZ=Asia/Jakarta
      - HEADLESS=true

  db:
    image: postgres:15
    container_name: srs_postgres
    restart: always
    environment:
      POSTGRES_USER: superfood_admin
      POSTGRES_PASSWORD: superfood_password
      POSTGRES_DB: srs_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Inisialisasi database dari skema pada run pertama
      - ./src/database:/docker-entrypoint-initdb.d

  warmer:
    build: .
    container_name: shopee_session_warmer
    init: true
    restart: unless-stopped
    working_dir: /app
    command: uv run --project src shopee-session-monitor/warmer.py
    env_file:
      - ./shopee-session-monitor/.env
    volumes:
      - ./src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
    environment:
      - PYTHONUNBUFFERED=1
      - HEADLESS=true
      - TZ=Asia/Jakarta
      - OFD_DISCORD_MODE=1

volumes:
  postgres_data:
