version: '3.8'

services:
  bot:
    build: .
    container_name: ofd_discord_bot
    init: true
    restart: unless-stopped
    working_dir: /app/discord-bot-form
    command: npm start
    # Variabel environment di-load dari file .env bot
    env_file:
      - ./discord-bot-form/.env
    # Volume untuk menyimpan data persisten & session agar tidak hilang saat restart
    volumes:
      - ./data:/app/data
      - ./src/database:/app/src/database
      - ./src/logs:/app/src/logs
      - ./src/laporan:/app/src/laporan
      # Volume untuk menyimpan kredensial / session Playwright jika ada
      - ./src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
      - ./src/baseline/shopee/data:/app/src/baseline/shopee/data
      - ./src/VB/shopee/sessions:/app/src/VB/shopee/sessions
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=superfood_admin
      - DB_PASS=superfood_password
      - DB_NAME=srs_db
      - HEADLESS=true
      - TZ=Asia/Jakarta

  session-monitor-bot:
    build: .
    container_name: ofd_session_monitor_bot
    init: true
    restart: unless-stopped
    working_dir: /app/discord-bot-session-monitor
    command: npm start
    env_file:
      - ./discord-bot-session-monitor/.env
    volumes:
      - ./data:/app/data
      - ./src/database:/app/src/database
      - ./src/logs:/app/src/logs
      - ./src/laporan:/app/src/laporan
      - ./src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
      - ./src/baseline/shopee/data:/app/src/baseline/shopee/data
      - ./src/VB/shopee/sessions:/app/src/VB/shopee/sessions
    depends_on:
      - db
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=superfood_admin
      - DB_PASS=superfood_password
      - DB_NAME=srs_db
      - HEADLESS=true
      - TZ=Asia/Jakarta

  db:
    image: postgres:15
    container_name: srs_postgres
    restart: always
    environment:
      POSTGRES_USER: superfood_admin
      POSTGRES_PASSWORD: superfood_password
      POSTGRES_DB: srs_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Inisialisasi database dari skema pada run pertama
      - ./src/database:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
