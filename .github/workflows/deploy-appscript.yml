        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push Omzet to Apps Script
        run: clasp push -f

  deploy-master-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/appscriptOFD/master-report

    steps:
