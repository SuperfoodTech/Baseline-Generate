name: Deploy Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy-otp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/appscriptOFD/otp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp auth
        run: node -e 'require("fs").writeFileSync(require("os").homedir() + "/.clasprc.json", process.env.CLASPRC_JSON)'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push OTP to Apps Script
        run: clasp push -f

      - name: Deploy OTP to Production
        run: clasp deploy -i AKfycby39J6Ds4SsjozVzknHHGvCgItNwlzgqj7wxYuxc4TDjratQbnJ-FLbNj7_QLvNv7HR -d "Auto-deployed via GitHub Actions"

  deploy-omzet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/appscriptOFD/omzet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp auth
        run: node -e 'require("fs").writeFileSync(require("os").homedir() + "/.clasprc.json", process.env.CLASPRC_JSON)'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push Omzet to Apps Script
        run: clasp push -f

      - name: Deploy Omzet to Production
        run: clasp deploy -i AKfycbz8zCLNqDnVaz6Iau7uD-hZiynpaHigjtElk6Wlb5onr_Y9pRgfjtEkYm9unr1cNxkq -d "Auto-deployed via GitHub Actions"

  deploy-master-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/appscriptOFD/master-report

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp auth
        run: node -e 'require("fs").writeFileSync(require("os").homedir() + "/.clasprc.json", process.env.CLASPRC_JSON)'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push Master Report to Apps Script
        run: clasp push -f

      - name: Deploy Master Report to Production
        run: clasp deploy -i AKfycbxUrtHCcuPpUiB95IGSotccsK-C2bWk-MVgsW3aK6-qK9eRUrENiTot-Jvv6_iPsNs5 -d "Auto-deployed via GitHub Actions"
