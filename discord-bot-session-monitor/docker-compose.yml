version: '3.8'

services:
  session-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ofd_session_monitor
    init: true
    restart: unless-stopped

    # Environment dari file .env bot ini
    env_file:
      - .env

    # Volume untuk akses shared resources dari proyek utama
    volumes:
      # Data OTP & session Shopee (dibaca & ditulis bot ini)
      - ../src/shopee-omzet-automation/data:/app/src/shopee-omzet-automation/data
      # Python venv dari proyek utama (agar tidak perlu install ulang)
      - ../src/.venv:/app/src/.venv:ro
      # Script checker Python
      - ../check_shopee_browsers.py:/app/check_shopee_browsers.py:ro
      # Playwright browser cache (agar tidak download ulang)
      - playwright_cache:/ms-playwright

    environment:
      - TZ=Asia/Jakarta
      - HEADLESS=true

volumes:
  playwright_cache:
